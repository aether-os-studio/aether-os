[package]
edition = "2024"
name = "aether-kernel"
version = "0.1.0"

[dependencies]
acpi = "5.2.0"
asc = {path = "../asc"}
bit_field = "0.10.2"
derive-where = "1.2.7"
error = {path = "crate/error"}
good_memory_allocator = "0.1.7"
gpt_disk_io = "0.16.1"
humansize = "2.1.3"
log = "0.4.26"
os-terminal = "0.6.7"
pci_types = "0.10.0"
rustc-demangle = "0.1.24"
spin = "0.9.8"
uart_16550 = "0.3.2"
vcell = "0.1.3"
x86 = "0.52.0"
x86_64 = "0.15.2"

[dependencies.derive_more]
default-features = false
features = ["full"]
version = "2.0.1"

[dependencies.fatfs]
default-features = false
features = ["lfn", "alloc", "unicode"]
path = "crate/fatfs"

[dependencies.limine]
features = ["uuid"]
version = "0.4"

[dependencies.uuid]
default-features = false
version = "1.0"

[dependencies.x2apic]
path = "crate/x2apic"

[dependencies.object]
default-features = false
features = ["read_core", "elf", "unaligned"]
version = "0.36.7"
